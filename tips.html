<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Your Driver - TravylWay</title>
  <meta name="description" content="Show your appreciation! Leave a tip for your TravylWay driver.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* NAV */
    .site-header{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.08);position:sticky;top:0;z-index:9999;}
    .nav-container{max-width:1200px;margin:0 auto;padding:1rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;}
    .nav-logo{font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;display:flex;align-items:center;gap:0.5rem;}
    .nav-logo-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,#667eea,#10b981);box-shadow:0 0 0 5px rgba(102,126,234,0.2);flex-shrink:0;}
    .nav-links{display:flex;gap:1.5rem;align-items:center;list-style:none;margin:0;padding:0;}
    .nav-links a{text-decoration:none;color:#64748b;font-weight:600;font-size:0.9rem;transition:color 0.2s;}
    .nav-links a:hover{color:#667eea;}
    .nav-links a.active{color:#667eea;}
    .nav-mobile-btn{display:none;background:none;border:none;font-size:1.5rem;cursor:pointer;padding:0.5rem;}
    @media(max-width:768px){.nav-links{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;flex-direction:column;padding:1rem;box-shadow:0 8px 16px rgba(0,0,0,0.1);gap:0;}.nav-links a{padding:1rem;width:100%;text-align:center;border-bottom:1px solid #f1f5f9;display:block;}.nav-links.tw-open{display:flex;}.nav-mobile-btn{display:block;}}

    :root{--primary:#667eea;--green:#10b981;--text:#0f172a;--gray:#64748b;--light-gray:#f1f5f9;--white:#ffffff;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;background:linear-gradient(135deg,var(--primary) 0%,#764ba2 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1rem;}
    .page-body{display:flex;align-items:center;justify-content:center;flex:1;width:100%;padding:1rem 0;}
    .container{max-width:500px;width:100%;background:var(--white);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;}
    .header{background:linear-gradient(135deg,var(--primary) 0%,#764ba2 100%);color:var(--white);padding:2rem;text-align:center;}
    .header h1{font-size:1.75rem;margin-bottom:0.5rem;}
    .header p{opacity:0.95;font-size:1rem;}
    .content{padding:2rem;}
    .section{margin-bottom:2rem;}
    .section:last-child{margin-bottom:0;}
    label{display:block;font-weight:700;margin-bottom:0.5rem;color:var(--text);font-size:0.95rem;}
    input{width:100%;padding:0.875rem;border:2px solid #e5e7eb;border-radius:10px;font-size:1rem;transition:border-color 0.2s;}
    input:focus{outline:none;border-color:var(--primary);}
    .btn{width:100%;padding:1rem;border:none;border-radius:10px;font-weight:800;font-size:1rem;cursor:pointer;transition:all 0.2s;}
    .btn-primary{background:var(--primary);color:var(--white);margin-top:1rem;}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(102,126,234,0.4);}
    .trip-info{background:var(--light-gray);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;}
    .trip-detail{margin-bottom:0.75rem;display:flex;gap:0.5rem;}
    .trip-detail:last-child{margin-bottom:0;}
    .trip-detail strong{color:var(--text);min-width:80px;}
    .trip-detail span{color:var(--gray);}
    .driver-name{font-size:1.25rem;font-weight:900;color:var(--primary);text-align:center;margin-bottom:1rem;}
    .tip-buttons{display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem;margin-bottom:1rem;}
    .tip-btn{padding:1.25rem;background:var(--light-gray);border:2px solid #e5e7eb;border-radius:12px;font-weight:800;font-size:1.1rem;color:var(--text);cursor:pointer;transition:all 0.2s;}
    .tip-btn:hover{border-color:var(--primary);background:rgba(102,126,234,0.1);transform:translateY(-2px);}
    .tip-btn.selected{background:var(--primary);color:var(--white);border-color:var(--primary);}
    .custom-tip{margin-top:1rem;display:none;}
    .custom-tip.active{display:block;}
    .payment-buttons{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.5rem;}
    .payment-btn{padding:1rem;border:none;border-radius:10px;font-weight:800;font-size:0.95rem;color:var(--white);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
    .venmo-btn{background:#008CFF;}
    .venmo-btn:hover:not(:disabled){background:#0077d9;transform:translateY(-2px);}
    .cashapp-btn{background:#00D632;}
    .cashapp-btn:hover:not(:disabled){background:#00c02b;transform:translateY(-2px);}
    .payment-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .message{padding:1rem;border-radius:10px;margin-bottom:1rem;text-align:center;font-weight:600;display:none;}
    .message.error{background:#fee2e2;color:#991b1b;display:block;}
    .message.success{background:#d1fae5;color:#065f46;display:block;}
    .loading{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:var(--white);animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .back-link{text-align:center;margin-top:1.5rem;}
    .back-link a{color:var(--gray);text-decoration:none;font-weight:600;font-size:0.9rem;}
    .back-link a:hover{color:var(--primary);}
  </style>
</head>
<body>

  <!-- NAV -->
  <header class="site-header" style="width:100%;position:sticky;top:0;">
    <nav class="nav-container">
      <a href="/" class="nav-logo"><span class="nav-logo-dot"></span><span>TravylWay</span></a>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/general.html">Book a Ride</a></li>
        <li><a href="/crew.html">Crew Booking</a></li>
        <li><a href="/hotels.html">Hotels</a></li>
        <li><a href="/driver.html">Driver Board</a></li>
        <li><a href="/reviews.html">Reviews</a></li>
      </ul>
      <button class="nav-mobile-btn" id="menuBtn" aria-label="Toggle menu">☰</button>
    </nav>
  </header>

  <div class="page-body">
    <div class="container">
      <div class="header">
        <h1>💝 Tip Your Driver</h1>
        <p>Show your appreciation for great service</p>
      </div>

      <div class="content">
        <div class="section" id="tripIdSection">
          <label for="tripId">Enter Your Trip ID</label>
          <input type="text" id="tripId" placeholder="ABC123" maxlength="20">
          <button class="btn btn-primary" id="lookupBtn">
            <span id="lookupText">Find Trip</span>
            <span class="loading" id="lookupSpinner" style="display:none;"></span>
          </button>
        </div>

        <div id="message" class="message"></div>

        <div id="tipSection" style="display:none;">
          <div class="trip-info">
            <div class="driver-name" id="driverName"></div>
            <div class="trip-detail"><strong>Date:</strong><span id="tripDate"></span></div>
            <div class="trip-detail"><strong>From:</strong><span id="tripPickup"></span></div>
            <div class="trip-detail"><strong>To:</strong><span id="tripDropoff"></span></div>
          </div>

          <div class="section">
            <label>Select Tip Amount</label>
            <div class="tip-buttons">
              <button class="tip-btn" data-amount="5">$5</button>
              <button class="tip-btn" data-amount="10">$10</button>
              <button class="tip-btn" data-amount="15">$15</button>
              <button class="tip-btn" data-amount="20">$20</button>
              <button class="tip-btn" data-amount="custom">Custom</button>
            </div>
            <div class="custom-tip" id="customTipSection">
              <label for="customAmount">Custom Amount</label>
              <input type="number" id="customAmount" placeholder="Enter amount" min="1" step="1">
            </div>
          </div>

          <div class="section">
            <label>Choose Payment Method</label>
            <div class="payment-buttons">
              <button class="payment-btn venmo-btn" id="venmoBtn" disabled>💙 Venmo</button>
              <button class="payment-btn cashapp-btn" id="cashappBtn" disabled>💚 Cash App</button>
            </div>
          </div>
        </div>

        <div class="back-link"><a href="/">← Back to Home</a></div>
      </div>
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://api.travylway.com';
    const VENMO_USERNAME = '@tway2084';
    const CASHAPP_USERNAME = '$tway66gworld';

    let currentTripId = null;
    let selectedAmount = null;
    let tripData = null;

    window.addEventListener('load', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const tripId = urlParams.get('trip');
      if (tripId) { document.getElementById('tripId').value = tripId; lookupTrip(); }
    });

    document.getElementById('lookupBtn').addEventListener('click', lookupTrip);
    document.getElementById('tripId').addEventListener('keypress', (e) => { if (e.key === 'Enter') lookupTrip(); });

    async function lookupTrip() {
      const tripId = document.getElementById('tripId').value.trim();
      if (!tripId) { showMessage('Please enter a Trip ID', 'error'); return; }
      const lookupBtn=document.getElementById('lookupBtn'),lookupText=document.getElementById('lookupText'),lookupSpinner=document.getElementById('lookupSpinner');
      lookupBtn.disabled=true;lookupText.style.display='none';lookupSpinner.style.display='inline-block';hideMessage();
      try {
        const response = await fetch(`${WORKER_URL}/api/trips/${tripId}`);
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || 'Trip not found');
        tripData = data.trip; currentTripId = tripId;
        displayTripInfo(tripData);
        document.getElementById('tripIdSection').style.display='none';
        document.getElementById('tipSection').style.display='block';
      } catch (error) {
        showMessage('❌ Trip not found. Please check your Trip ID.', 'error');
      } finally {
        lookupBtn.disabled=false;lookupText.style.display='inline';lookupSpinner.style.display='none';
      }
    }

    function displayTripInfo(trip) {
      document.getElementById('driverName').textContent = `Tip ${trip.driver_name || 'Your Driver'}`;
      document.getElementById('tripDate').textContent = new Date(trip.pickup_time_utc).toLocaleDateString();
      document.getElementById('tripPickup').textContent = trip.pickup_text;
      document.getElementById('tripDropoff').textContent = trip.dropoff_text;
    }

    document.querySelectorAll('.tip-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        const amount = this.dataset.amount;
        if (amount === 'custom') { document.getElementById('customTipSection').classList.add('active'); selectedAmount=null; updatePaymentButtons(); }
        else { document.getElementById('customTipSection').classList.remove('active'); selectedAmount=parseInt(amount); updatePaymentButtons(); }
      });
    });

    document.getElementById('customAmount').addEventListener('input', function() { const v=parseInt(this.value); selectedAmount=v>0?v:null; updatePaymentButtons(); });

    function updatePaymentButtons() {
      const en = selectedAmount && selectedAmount > 0;
      document.getElementById('venmoBtn').disabled = !en;
      document.getElementById('cashappBtn').disabled = !en;
    }

    document.getElementById('venmoBtn').addEventListener('click', () => {
      if (selectedAmount > 0) {
        logTip('venmo');
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile) { window.location.href = `venmo://paycharge?txn=pay&recipients=${VENMO_USERNAME.replace('@','')}&amount=${selectedAmount}&note=Tip%20for%20Trip%20${currentTripId}`; }
        else { alert(`💙 Venmo Payment\n\nSend $${selectedAmount} to: ${VENMO_USERNAME}\n\nNote: Tip for Trip ${currentTripId}\n\nPlease use Venmo app on your phone`); }
      }
    });

    document.getElementById('cashappBtn').addEventListener('click', () => {
      if (selectedAmount > 0) {
        logTip('cashapp');
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile) { window.location.href = `https://cash.app/${CASHAPP_USERNAME}/${selectedAmount}`; }
        else { alert(`💚 Cash App Payment\n\nSend $${selectedAmount} to: ${CASHAPP_USERNAME}\n\nNote: Tip for Trip ${currentTripId}\n\nPlease use Cash App on your phone`); }
      }
    });

    async function logTip(method) {
      try {
        await fetch(`${WORKER_URL}/api/tips`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ trip_id:currentTripId, amount:selectedAmount, method:method, timestamp:new Date().toISOString() }) });
      } catch (error) { console.error('Failed to log tip:', error); }
    }

    function showMessage(text, type) { const m=document.getElementById('message'); m.textContent=text; m.className=`message ${type}`; }
    function hideMessage() { document.getElementById('message').className='message'; }

    // Nav mobile menu
    const menuBtn=document.getElementById('menuBtn');
    const navLinks=document.getElementById('navLinks');
    menuBtn.addEventListener('click',()=>{navLinks.classList.toggle('tw-open');menuBtn.textContent=navLinks.classList.contains('tw-open')?'✕':'☰';});
    navLinks.querySelectorAll('a').forEach(link=>{link.addEventListener('click',()=>{navLinks.classList.remove('tw-open');menuBtn.textContent='☰';});});
  </script>
</body>
</html>
